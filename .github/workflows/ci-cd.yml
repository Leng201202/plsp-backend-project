name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/backend:${{ github.sha }} -f Dockerfile.prod .

      - name: Push Docker Image to Cloud Run
        run: |
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_GAR_REPO }}/backend:${{ github.sha }}"
          REGION="${{ secrets.GCP_REGION }}"
          SQL_CONNECTION="${{ secrets.GCP_SQL_CONNECTION_NAME }}"

          # Build env vars — include all DB connection values
          ENV_VARS=""
          if [ -n "$SQL_CONNECTION" ]; then
            ENV_VARS="DB_SOCKET_PATH=/cloudsql/$SQL_CONNECTION"
          else
            ENV_VARS="DB_HOST=${{ secrets.DB_HOST }},DB_PORT=${{ secrets.DB_PORT }}"
          fi
          ENV_VARS="${ENV_VARS},DB_USERNAME=${{ secrets.DB_USERNAME }}"
          ENV_VARS="${ENV_VARS},DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          ENV_VARS="${ENV_VARS},DB_DATABASE_NAME=${{ secrets.DB_DATABASE_NAME }}"

          # Build gcloud deploy command
          CMD="gcloud run deploy backend --image $IMAGE --region $REGION --allow-unauthenticated --port 8080"
          CMD="$CMD --update-env-vars ^,^$ENV_VARS"
          CMD="$CMD --update-labels ^,^managed-by=github-actions,commit-sha=${{ github.sha }}"

          # Conditionally add Cloud SQL
          if [ -n "$SQL_CONNECTION" ]; then
            CMD="$CMD --add-cloudsql-instances=$SQL_CONNECTION"
          fi

          echo "Running: $CMD"
          eval "$CMD"
